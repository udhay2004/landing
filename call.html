<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Call — Comply Globally</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #070710;
  --gold: #c9a96e;
  --gold-light: #e8d2a8;
  --gold-dim: rgba(201,169,110,0.15);
  --text: #f0ecf8;
  --text-muted: rgba(240,236,248,0.5);
  --text-dim: rgba(240,236,248,0.25);
  --border: rgba(255,255,255,0.07);
  --green: #4ade80;
  --red: #f87171;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--ink);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-mesh::before {
  content: "";
  position: absolute; width: 800px; height: 800px; top: -200px; left: -200px;
  background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 65%);
  animation: drift1 18s ease-in-out infinite alternate;
}
.bg-mesh::after {
  content: "";
  position: absolute; width: 600px; height: 600px; bottom: -100px; right: -100px;
  background: radial-gradient(circle, rgba(201,169,110,0.10) 0%, transparent 65%);
  animation: drift2 14s ease-in-out infinite alternate;
}
@keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(80px,60px)} }
@keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-60px,-40px)} }

.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* TOPBAR */
.topbar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 2rem;
  background: rgba(7,7,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700; color: var(--text);
}
.logo-dot {
  width: 7px; height: 7px; background: var(--gold);
  border-radius: 50%; box-shadow: 0 0 8px var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

.call-badge {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--green);
}
.live-dot {
  width: 8px; height: 8px; background: var(--green);
  border-radius: 50%; box-shadow: 0 0 10px var(--green);
  animation: livepulse 1.4s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.timer {
  font-size: 0.78rem; color: var(--text-muted);
  font-variant-numeric: tabular-nums; letter-spacing: 0.05em; font-weight: 500;
}

/* LAYOUT */
.call-layout {
  position: relative; z-index: 5; flex: 1;
  display: grid; grid-template-columns: 1fr 360px;
  gap: 0; overflow: hidden;
}

/* AVATAR PANEL */
.avatar-panel {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(10,8,22,0.6);
  border-right: 1px solid var(--border);
  padding: 2rem; gap: 2rem; overflow: hidden;
}
.corner {
  position: absolute; width: 28px; height: 28px;
  border-color: rgba(201,169,110,0.25); border-style: solid;
}
.corner-tl { top:16px; left:16px; border-width:2px 0 0 2px; }
.corner-tr { top:16px; right:16px; border-width:2px 2px 0 0; }
.corner-bl { bottom:16px; left:16px; border-width:0 0 2px 2px; }
.corner-br { bottom:16px; right:16px; border-width:0 2px 2px 0; }

.avatar-orb {
  position: relative; width: 220px; height: 220px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.orb-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  border: 2px solid transparent;
  background: conic-gradient(from 0deg, var(--gold), rgba(201,169,110,0.1), var(--gold)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  animation: spin 8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.orb-ring-2 {
  position: absolute; inset: -24px; border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.12);
  animation: spin 16s linear infinite reverse;
}
.orb-glow {
  position: absolute; inset: -40px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 65%);
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.08);opacity:1} }
.orb-inner {
  width: 220px; height: 220px; border-radius: 50%;
  background: linear-gradient(135deg, #1a1630, #0d0b1a);
  border: 1px solid rgba(201,169,110,0.2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.5rem;
  overflow: hidden; position: relative;
}
.orb-inner::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(to bottom, rgba(201,169,110,0.07), transparent);
  border-radius: 50% 50% 0 0 / 50% 50% 0 0;
}
.avatar-initials {
  font-family: 'Playfair Display', serif;
  font-size: 4rem; font-weight: 700; color: var(--gold);
  line-height: 1; position: relative; z-index: 1;
}
.avatar-label {
  font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(201,169,110,0.5); position: relative; z-index: 1;
}

.speaking-bars {
  display: flex; align-items: flex-end; gap: 4px;
  height: 32px; opacity: 0; transition: opacity 0.4s;
}
.speaking-bars.active { opacity: 1; }
.bar { width: 4px; background: var(--gold); border-radius: 2px; min-height: 4px; }
.bar:nth-child(1) { animation: bar1 0.9s ease-in-out infinite; }
.bar:nth-child(2) { animation: bar2 0.7s ease-in-out infinite 0.1s; }
.bar:nth-child(3) { animation: bar1 1.1s ease-in-out infinite 0.2s; }
.bar:nth-child(4) { animation: bar2 0.8s ease-in-out infinite 0.05s; }
.bar:nth-child(5) { animation: bar1 0.95s ease-in-out infinite 0.15s; }
@keyframes bar1 { 0%,100%{height:6px} 50%{height:28px} }
@keyframes bar2 { 0%,100%{height:14px} 50%{height:8px} }

.name-plate { text-align: center; }
.name-plate h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem;
}
.name-plate p { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.06em; }

.self-view {
  position: absolute; bottom: 1.5rem; left: 1.5rem;
  width: 120px; height: 90px;
  background: rgba(20,18,35,0.9);
  border: 1px solid rgba(201,169,110,0.2); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0.3rem; overflow: hidden;
}
.self-view-icon { font-size: 1.8rem; }
.self-view-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

/* CHAT PANEL */
.chat-panel {
  display: flex; flex-direction: column;
  background: rgba(7,7,16,0.7); overflow: hidden;
}
.chat-header {
  padding: 1rem 1.4rem; border-bottom: 1px solid var(--border);
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim); flex-shrink: 0;
  display: flex; align-items: center; gap: 0.5rem;
}
.chat-header::before {
  content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 1.2rem;
  display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 3px; }
.msg {
  display: flex; flex-direction: column; gap: 0.3rem;
  animation: msgIn 0.35s ease both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg-sender { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
.msg.ai .msg-sender { color: var(--gold); }
.msg.user .msg-sender { color: rgba(139,92,246,0.8); text-align: right; }
.msg-bubble {
  padding: 0.65rem 0.9rem; border-radius: 12px;
  font-size: 0.82rem; line-height: 1.6; color: var(--text-muted);
}
.msg.ai .msg-bubble {
  background: rgba(201,169,110,0.07); border: 1px solid rgba(201,169,110,0.12);
  border-radius: 4px 12px 12px 12px;
}
.msg.user .msg-bubble {
  background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.15);
  border-radius: 12px 4px 12px 12px; align-self: flex-end;
}
.typing-indicator {
  display: none; align-items: center; gap: 4px; padding: 0.65rem 0.9rem;
  background: rgba(201,169,110,0.07); border: 1px solid rgba(201,169,110,0.12);
  border-radius: 4px 12px 12px 12px; width: fit-content;
}
.typing-indicator.visible { display: flex; }
.typing-dot {
  width: 6px; height: 6px; background: var(--gold); border-radius: 50%; opacity: 0.4;
  animation: typingbounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingbounce { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

/* BOTTOM BAR */
.bottombar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  gap: 1.2rem; padding: 1.2rem 2rem;
  background: rgba(7,7,16,0.92); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.ctrl-btn {
  display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
  background: none; border: none; cursor: pointer; transition: all 0.2s;
}
.ctrl-icon {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; transition: all 0.25s;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
}
.ctrl-icon.active { background: rgba(201,169,110,0.12); border-color: rgba(201,169,110,0.3); }
.ctrl-icon.muted { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.25); }
.ctrl-label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
.end-btn {
  display: flex; align-items: center; gap: 0.5rem;
  background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3);
  color: var(--red); cursor: pointer; border-radius: 3rem;
  padding: 0.7rem 1.6rem; font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  transition: all 0.2s;
}
.end-btn:hover { background: rgba(248,113,113,0.22); transform: scale(1.03); }

.info-strip { display: flex; align-items: center; gap: 0.75rem; }
.info-pill {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.28rem 0.75rem;
  background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.2);
  border-radius: 2rem; font-size: 0.65rem; color: var(--gold); letter-spacing: 0.06em; white-space: nowrap;
}

@media (max-width: 768px) {
  .call-layout { grid-template-columns: 1fr; }
  .chat-panel { display: none; }
  .avatar-orb { width: 160px; height: 160px; }
  .orb-inner { width: 160px; height: 160px; }
  .avatar-initials { font-size: 3rem; }
  .topbar, .bottombar { padding: 0.7rem 1rem; }
  .ctrl-icon { width: 42px; height: 42px; }
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="grain"></div>

<header class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    Comply Globally
  </div>
  <div class="info-strip">
    <div class="call-badge"><div class="live-dot"></div>Live Session</div>
    <div class="info-pill" id="clientPill">🔒 Secure Call</div>
  </div>
  <div class="timer" id="callTimer">00:00</div>
</header>

<main class="call-layout">
  <div class="avatar-panel" id="avatarPanel">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="avatar-orb">
      <div class="orb-glow"></div>
      <div class="orb-ring-2"></div>
      <div class="orb-ring"></div>
      <div class="orb-inner">
        <div class="avatar-initials">CG</div>
        <div class="avatar-label">AI Consultant</div>
      </div>
    </div>
    <div class="speaking-bars" id="speakingBars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="name-plate">
      <h2>AI Strategy Consultant</h2>
      <p id="welcomeLabel">Connecting you with your personalized session…</p>
    </div>
    <div class="self-view">
      <div class="self-view-icon">👤</div>
      <div class="self-view-label">You</div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-header">Session Transcript</div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg ai">
        <div class="msg-sender">AI Consultant</div>
        <div class="msg-bubble" id="greetBubble">Connecting…</div>
      </div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>
</main>

<footer class="bottombar">
  <button class="ctrl-btn" id="micBtn">
    <div class="ctrl-icon active" id="micIcon">🎤</div>
    <span class="ctrl-label">Mic</span>
  </button>
  <button class="ctrl-btn" id="speakerBtn">
    <div class="ctrl-icon active" id="speakerIcon">🔊</div>
    <span class="ctrl-label">Speaker</span>
  </button>
  <button class="end-btn" id="endCallBtn">📞 End Call</button>
  <button class="ctrl-btn" id="chatBtn">
    <div class="ctrl-icon" id="chatIcon">💬</div>
    <span class="ctrl-label">Chat</span>
  </button>
</footer>

<!-- VOICEFLOW WIDGET -->
<script type="text/javascript">
(function(d, t) {
  var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
  v.onload = function() {

    // ── 1. Read personalisation params from URL ─────────────────
    const params    = new URLSearchParams(window.location.search);
    const userName  = params.get('name')    || '';
    const userCo    = params.get('company') || '';
    const userMkt   = params.get('country') || '';
    const userStg   = params.get('stage')   || '';

    // ── 2. Personalise on-screen UI ────────────────────────────
    if (userName) {
      document.getElementById('welcomeLabel').textContent =
        'Welcome, ' + userName + '. Your session is starting…';
      document.getElementById('clientPill').textContent =
        '👤 ' + userName + (userCo ? ' · ' + userCo : '');
    }

    const greeting = userName
      ? 'Hi ' + userName + '! 👋 I\'m your AI Strategy Consultant at Comply Globally. '
        + (userMkt ? 'I see you\'re targeting ' + userMkt + ' — great choice. ' : '')
        + 'Let\'s map out your expansion. What\'s the biggest challenge you\'re facing right now?'
      : 'Hey there! 👋 I\'m your AI Strategy Consultant at Comply Globally. '
        + 'Ready to help you expand globally without the compliance headaches. '
        + 'What market are you targeting?';

    // ── 3. Show typing indicator then greeting ──────────────────
    document.getElementById('typingIndicator').classList.add('visible');
    setTimeout(() => {
      document.getElementById('typingIndicator').classList.remove('visible');
      document.getElementById('greetBubble').textContent = greeting;
      document.getElementById('speakingBars').classList.add('active');
      setTimeout(() => document.getElementById('speakingBars').classList.remove('active'), 4500);
    }, 1800);

    // ── 4. Load Voiceflow, passing user data as launch variables ─
    window.voiceflow.chat.load({
      verify: { projectID: '69eb51abea3f2a4428074aeb' },
      url: 'https://general-runtime.voiceflow.com',
      versionID: 'production',
      voice: { url: 'https://runtime-api.voiceflow.com' },
      launch: {
        event: {
          type: 'launch',
          payload: {
            name:    userName,
            company: userCo,
            country: userMkt,
            stage:   userStg
          }
        }
      }
    });
  };
  v.src  = 'https://cdn.voiceflow.com/widget-next/bundle.mjs';
  v.type = 'text/javascript';
  s.parentNode.insertBefore(v, s);
})(document, 'script');
</script>

<script>
// ─── Timer ──────────────────────────────────────────────────────
let seconds = 0;
const timerEl = document.getElementById('callTimer');
setInterval(() => {
  seconds++;
  timerEl.textContent =
    String(Math.floor(seconds/60)).padStart(2,'0') + ':' +
    String(seconds%60).padStart(2,'0');
}, 1000);

// ─── Mic toggle ─────────────────────────────────────────────────
let micOn = true;
document.getElementById('micBtn').addEventListener('click', () => {
  micOn = !micOn;
  const el = document.getElementById('micIcon');
  el.textContent = micOn ? '🎤' : '🔇';
  el.className   = 'ctrl-icon ' + (micOn ? 'active' : 'muted');
});

// ─── Speaker toggle ─────────────────────────────────────────────
let spkOn = true;
document.getElementById('speakerBtn').addEventListener('click', () => {
  spkOn = !spkOn;
  const el = document.getElementById('speakerIcon');
  el.textContent = spkOn ? '🔊' : '🔕';
  el.className   = 'ctrl-icon ' + (spkOn ? 'active' : '');
});

// ─── Open VF widget ─────────────────────────────────────────────
document.getElementById('chatBtn').addEventListener('click', () => {
  if (window.voiceflow && window.voiceflow.chat) window.voiceflow.chat.open();
  document.getElementById('chatIcon').className = 'ctrl-icon active';
});

// ─── End call ───────────────────────────────────────────────────
document.getElementById('endCallBtn').addEventListener('click', () => {
  if (confirm('End this strategy session?')) {
    window.location.href = 'https://udhay2004.github.io/landing/'; // ← change to your homepage URL
  }
});

// ─── Ambient speaking animation ─────────────────────────────────
setInterval(() => {
  if (Math.random() > 0.8) {
    const bars = document.getElementById('speakingBars');
    bars.classList.add('active');
    setTimeout(() => bars.classList.remove('active'), 2000 + Math.random()*3000);
  }
}, 7000);
</script>
</body>
</html>
