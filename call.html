<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dr. CV — Strategy Session</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0a0a0f;
    height: 100vh;
    overflow: hidden;
  }

  /* Main container */
  .call-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
  }

  /* Top bar */
  .top-bar {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    z-index: 10;
  }

  .brand {
    font-size: 11px;
    letter-spacing: 3px;
    color: #00d4ff;
    font-weight: 600;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.5);
    padding: 6px 14px;
    border-radius: 40px;
  }

  .status-light {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .status-light.ready { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .status-light.listening { background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: pulse 1s infinite; }
  .status-light.speaking { background: #00d4ff; box-shadow: 0 0 10px #00d4ff; animation: pulse 0.5s infinite; }
  .status-light.thinking { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1.2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
  }

  .status-text {
    font-size: 12px;
    font-weight: 500;
    color: #cbd5e1;
  }

  /* Avatar section */
  .avatar-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
  }

  canvas {
    width: auto;
    height: auto;
    max-width: 90vw;
    max-height: 70vh;
    border-radius: 32px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  /* Controls */
  .controls {
    padding: 20px 24px 30px;
    display: flex;
    justify-content: center;
    gap: 16px;
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0, 212, 255, 0.1);
  }

  .ctrl-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(30, 30, 40, 0.9);
    border: 1px solid rgba(0, 212, 255, 0.2);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .ctrl-btn:hover {
    background: rgba(0, 212, 255, 0.15);
    border-color: #00d4ff;
    transform: scale(1.05);
  }

  .ctrl-btn.mic-btn {
    background: rgba(0, 212, 255, 0.1);
    border-color: #00d4ff;
    width: 64px;
    height: 64px;
  }

  .ctrl-btn.mic-btn.active {
    background: rgba(239, 68, 68, 0.2);
    border-color: #ef4444;
    animation: micPulse 1.3s infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
  }

  .ctrl-btn.muted {
    opacity: 0.5;
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-content {
    text-align: center;
  }

  .loading-spinner {
    width: 50px;
    height: 50px;
    border: 2px solid rgba(0, 212, 255, 0.2);
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    color: #94a3b8;
    font-size: 14px;
  }

  /* Error toast */
  .error-toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239, 68, 68, 0.9);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-size: 13px;
    z-index: 100;
    display: none;
    white-space: nowrap;
  }

  @media (max-width: 640px) {
    .top-bar { padding: 12px 16px; }
    .controls { padding: 16px 20px 24px; gap: 12px; }
    .ctrl-btn { width: 48px; height: 48px; }
    .ctrl-btn.mic-btn { width: 56px; height: 56px; }
    .status-text { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="call-container">
  <div class="top-bar">
    <div class="brand">COMPLY GLOBALLY</div>
    <div class="status-badge">
      <div class="status-light" id="statusLight"></div>
      <span class="status-text" id="statusText">Initializing...</span>
    </div>
  </div>

  <div class="avatar-section">
    <canvas id="avatarCanvas" width="600" height="600"></canvas>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="resetBtn" title="Reset">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
    <button class="ctrl-btn mic-btn" id="micBtn" title="Click to speak">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="muteBtn" title="Mute">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 5 6 9H2v6h4l5 4V5z"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
  </div>

  <div class="error-toast" id="errorToast"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Starting your session...</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// PROFESSIONAL VOICE CALL WITH REALISTIC AVATAR
// ════════════════════════════════════════════════════════════════

// ─── CONFIGURATION ─────────────────────────────────────────────
const WORKER_URL = 'https://drcv.onrender.com';
const WEBHOOK_URL = 'YOUR_APPS_SCRIPT_WEBHOOK_URL'; // Replace!

// Get lead data from URL or session storage
const params = new URLSearchParams(window.location.search);
let LEAD = {
  name: decodeURIComponent(params.get('name') || ''),
  email: decodeURIComponent(params.get('email') || ''),
  company: decodeURIComponent(params.get('company') || ''),
  country: decodeURIComponent(params.get('country') || ''),
  stage: decodeURIComponent(params.get('stage') || ''),
  leadId: params.get('leadId') || '',
  sessionId: params.get('sessionId') || ''
};

// If no URL params, try session storage
if (!LEAD.name) {
  const stored = sessionStorage.getItem('leadData');
  if (stored) {
    LEAD = JSON.parse(stored);
  }
}

// Generate IDs if missing
if (!LEAD.leadId) LEAD.leadId = 'lead_' + Date.now();
if (!LEAD.sessionId) LEAD.sessionId = 'sess_' + Date.now();

// ─── AVATAR CANVAS ────────────────────────────────────────────
const canvas = document.getElementById('avatarCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 600;

let mouthOpen = 0;
let eyeBlink = 1;
let headX = 0, headY = 0;
let speakingIntensity = 0;
let listeningIntensity = 0;
let blinkTimer = 0;

function drawAvatar() {
  const cx = 300, cy = 280;
  
  ctx.clearRect(0, 0, 600, 600);
  
  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 600);
  bgGrad.addColorStop(0, '#0a0a0f');
  bgGrad.addColorStop(1, '#12121a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 600, 600);
  
  // Head
  ctx.save();
  ctx.translate(headX * 0.5, headY * 0.3);
  
  // Face oval
  ctx.beginPath();
  ctx.ellipse(cx, cy, 150, 180, 0, 0, Math.PI * 2);
  const skinGrad = ctx.createLinearGradient(cx - 50, cy - 60, cx + 50, cy + 80);
  skinGrad.addColorStop(0, '#e8b87a');
  skinGrad.addColorStop(0.5, '#d4a06a');
  skinGrad.addColorStop(1, '#c08a55');
  ctx.fillStyle = skinGrad;
  ctx.fill();
  
  // Hair
  ctx.beginPath();
  ctx.ellipse(cx, cy - 150, 160, 90, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#2a1a0a';
  ctx.fill();
  
  // Eyes
  const eyeY = cy - 30;
  const eyeOpen = eyeBlink;
  
  // Left eye
  ctx.fillStyle = '#f0ede8';
  ctx.beginPath();
  ctx.ellipse(cx - 45, eyeY, 18, 12 * eyeOpen, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a2a18';
  ctx.beginPath();
  ctx.ellipse(cx - 45, eyeY, 10, 10 * eyeOpen, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.arc(cx - 45, eyeY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx - 48, eyeY - 3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Right eye
  ctx.fillStyle = '#f0ede8';
  ctx.beginPath();
  ctx.ellipse(cx + 45, eyeY, 18, 12 * eyeOpen, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4a2a18';
  ctx.beginPath();
  ctx.ellipse(cx + 45, eyeY, 10, 10 * eyeOpen, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.arc(cx + 45, eyeY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx + 42, eyeY - 3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Eyebrows
  ctx.beginPath();
  ctx.moveTo(cx - 75, eyeY - 20);
  ctx.quadraticCurveTo(cx - 55, eyeY - 28, cx - 35, eyeY - 22);
  ctx.lineWidth = 7;
  ctx.strokeStyle = '#3a2510';
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(cx + 75, eyeY - 20);
  ctx.quadraticCurveTo(cx + 55, eyeY - 28, cx + 35, eyeY - 22);
  ctx.stroke();
  
  // Nose
  ctx.beginPath();
  ctx.moveTo(cx, eyeY + 10);
  ctx.quadraticCurveTo(cx + 3, eyeY + 30, cx, eyeY + 40);
  ctx.strokeStyle = 'rgba(100, 60, 30, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Mouth
  const mouthY = cy + 45;
  const mouthW = 40;
  const openAmount = mouthOpen * 12;
  
  ctx.fillStyle = '#b55a50';
  ctx.beginPath();
  ctx.moveTo(cx - mouthW, mouthY - 3);
  ctx.quadraticCurveTo(cx - 15, mouthY - 9, cx, mouthY - 6);
  ctx.quadraticCurveTo(cx + 15, mouthY - 9, cx + mouthW, mouthY - 3);
  ctx.quadraticCurveTo(cx, mouthY + openAmount * 0.6, cx - mouthW, mouthY - 3);
  ctx.fill();
  
  if (mouthOpen > 0.1) {
    ctx.fillStyle = '#3a1510';
    ctx.beginPath();
    ctx.moveTo(cx - mouthW + 12, mouthY);
    ctx.quadraticCurveTo(cx, mouthY + openAmount * 0.7, cx + mouthW - 12, mouthY);
    ctx.fill();
  }
  
  // Shoulders
  ctx.fillStyle = '#1a1a24';
  ctx.beginPath();
  ctx.moveTo(cx - 120, cy + 160);
  ctx.quadraticCurveTo(cx, cy + 250, cx + 120, cy + 160);
  ctx.fill();
  
  ctx.restore();
  
  requestAnimationFrame(drawAvatar);
}

drawAvatar();

// Eye blink animation
setInterval(() => {
  eyeBlink = 0;
  setTimeout(() => { eyeBlink = 1; }, 100);
}, 4000);

// Head movement
setInterval(() => {
  headX = (Math.random() - 0.5) * 4;
  headY = (Math.random() - 0.5) * 3;
  setTimeout(() => {
    headX = 0;
    headY = 0;
  }, 800);
}, 5000);

// Mouth animation based on speaking
function updateMouth() {
  if (speakingIntensity > 0) {
    mouthOpen = 0.2 + Math.random() * 0.6;
  } else {
    mouthOpen = mouthOpen * 0.9;
  }
  setTimeout(updateMouth, 80);
}
updateMouth();

// ─── VOICE STATE ──────────────────────────────────────────────
let isListening = false;
let isSpeaking = false;
let voiceMuted = false;
let recognition = null;
let voices = [];
let speechQueue = [];
let isProcessingQueue = false;
let currentUtterance = null;
let history = [];
let turns = 0;

// Update UI status
function updateUIStatus(status) {
  const light = document.getElementById('statusLight');
  const text = document.getElementById('statusText');
  
  light.className = 'status-light ' + status;
  
  const statusMap = {
    ready: 'Ready',
    listening: 'Listening...',
    thinking: 'Thinking...',
    speaking: 'Speaking...'
  };
  
  text.textContent = statusMap[status] || status;
  
  if (status === 'listening') listeningIntensity = 0.5;
  else if (status === 'speaking') speakingIntensity = 0.6;
  else {
    listeningIntensity = 0;
    speakingIntensity = 0;
  }
}

// ─── SYSTEM PROMPT ────────────────────────────────────────────
function buildSystemPrompt() {
  const context = LEAD.name ? `
LEAD CONTEXT (You already know this):
- Name: ${LEAD.name}
- Company: ${LEAD.company || 'Not provided'}
- Target Market: ${LEAD.country || 'Not specified'}
- Expansion Stage: ${LEAD.stage || 'Exploring'}

Start the conversation by saying: "Hi ${LEAD.name}! Thanks for joining. I'm Dr. CV, your global expansion strategist.` : '';
  
  return `You are Dr. CV, a warm, professional Global Expansion Strategist at Comply Globally.
${context}

VOICE CONVERSATION RULES:
- Max 2-3 sentences per response
- One question at a time
- Natural, conversational tone
- Never say "As an AI"

Start naturally and ask ONE question to understand their needs.`;
}

// ─── TTS FUNCTIONS ────────────────────────────────────────────
function cleanForSpeech(text) {
  return text
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/\bUAE\b/g, 'the U A E')
    .replace(/\bUSA\b/g, 'the U S A')
    .replace(/\bLLC\b/g, 'L L C')
    .replace(/\$(\d+)B\b/g, '$$$1 billion')
    .trim();
}

function loadVoices() {
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function getBestVoice() {
  const preferred = ['Samantha', 'Google UK English Female', 'Google US English'];
  for (const name of preferred) {
    const voice = voices.find(v => v.name.includes(name));
    if (voice) return voice;
  }
  return voices[0];
}

function processSpeechQueue() {
  if (isProcessingQueue || speechQueue.length === 0 || isSpeaking) return;
  
  isProcessingQueue = true;
  const text = speechQueue.shift();
  
  if (!text.trim() || voiceMuted) {
    isProcessingQueue = false;
    processSpeechQueue();
    return;
  }
  
  const cleaned = cleanForSpeech(text);
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  
  currentUtterance = new SpeechSynthesisUtterance(cleaned);
  const voice = getBestVoice();
  if (voice) currentUtterance.voice = voice;
  currentUtterance.rate = 0.92;
  currentUtterance.pitch = 1.05;
  
  currentUtterance.onstart = () => {
    isSpeaking = true;
    speakingIntensity = 0.6;
    updateUIStatus('speaking');
  };
  
  currentUtterance.onend = () => {
    isSpeaking = false;
    speakingIntensity = 0;
    currentUtterance = null;
    isProcessingQueue = false;
    
    if (speechQueue.length > 0) {
      processSpeechQueue();
    } else {
      updateUIStatus('ready');
      // Auto-start listening after speaking
      if (!voiceMuted) {
        setTimeout(() => startListening(), 500);
      }
    }
  };
  
  currentUtterance.onerror = () => {
    isSpeaking = false;
    speakingIntensity = 0;
    isProcessingQueue = false;
    updateUIStatus('ready');
  };
  
  speechSynthesis.speak(currentUtterance);
}

function speak(text) {
  if (!text.trim() || voiceMuted) return;
  speechQueue.push(text);
  processSpeechQueue();
}

function stopSpeaking() {
  speechQueue = [];
  if (currentUtterance) {
    speechSynthesis.cancel();
    currentUtterance = null;
  }
  isSpeaking = false;
  speakingIntensity = 0;
  isProcessingQueue = false;
}

// ─── SPEECH RECOGNITION ───────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('Speech recognition requires Chrome or Edge');
    return false;
  }
  
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  
  let finalTranscript = '';
  let silenceTimeout = null;
  
  recognition.onstart = () => {
    isListening = true;
    listeningIntensity = 0.5;
    finalTranscript = '';
    updateUIStatus('listening');
    document.getElementById('micBtn').classList.add('active');
  };
  
  recognition.onresult = (event) => {
    if (silenceTimeout) clearTimeout(silenceTimeout);
    
    let newFinal = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        newFinal += event.results[i][0].transcript + ' ';
      }
    }
    
    if (newFinal) {
      finalTranscript += newFinal;
      listeningIntensity = 0.3 + Math.random() * 0.3;
    }
    
    silenceTimeout = setTimeout(() => {
      if (finalTranscript.trim()) {
        const userText = finalTranscript.trim();
        stopListening();
        sendMessage(userText);
      } else if (!isSpeaking) {
        stopListening();
        setTimeout(() => startListening(), 500);
      }
    }, 1000);
  };
  
  recognition.onerror = (event) => {
    if (event.error === 'no-speech' && !isSpeaking) {
      stopListening();
      setTimeout(() => startListening(), 500);
    } else if (event.error !== 'aborted') {
      showError('Mic error: ' + event.error);
      stopListening();
    }
  };
  
  recognition.onend = () => {
    isListening = false;
    listeningIntensity = 0;
    document.getElementById('micBtn').classList.remove('active');
    if (!isSpeaking) updateUIStatus('ready');
  };
  
  return true;
}

function startListening() {
  if (isSpeaking) {
    setTimeout(() => startListening(), 500);
    return;
  }
  if (isListening) return;
  if (!recognition && !initRecognition()) return;
  
  try {
    recognition.start();
  } catch (e) {
    recognition = null;
    initRecognition();
    setTimeout(() => startListening(), 300);
  }
}

function stopListening() {
  if (!isListening) return;
  try {
    recognition.stop();
  } catch (e) {}
}

// ─── API CALL ─────────────────────────────────────────────────
async function sendMessage(userText) {
  if (!userText.trim()) return;
  
  stopListening();
  updateUIStatus('thinking');
  
  history.push({ role: 'user', content: userText });
  turns++;
  
  let fullReply = '';
  let speechBuffer = '';
  
  try {
    const response = await fetch(WORKER_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystemPrompt(),
        messages: history
      })
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      
      for (const line of lines) {
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        
        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
            const textChunk = parsed.delta.text;
            fullReply += textChunk;
            speechBuffer += textChunk;
            
            const sentences = speechBuffer.match(/[^.!?]*[.!?]+/g);
            if (sentences && sentences.length > 1) {
              for (let i = 0; i < sentences.length - 1; i++) {
                speak(sentences[i].trim());
              }
              speechBuffer = sentences[sentences.length - 1];
            }
          }
        } catch (e) {}
      }
    }
    
    if (speechBuffer.trim()) speak(speechBuffer.trim());
    
    history.push({ role: 'assistant', content: fullReply.trim() });
    if (history.length > 20) history = history.slice(-20);
    
  } catch (err) {
    showError('Connection issue. Please refresh.');
    updateUIStatus('ready');
  }
}

function showError(msg) {
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 4000);
}

// ─── INITIALIZATION ───────────────────────────────────────────
async function init() {
  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');
  
  loadingText.textContent = 'Initializing Dr. CV...';
  await new Promise(r => setTimeout(r, 800));
  
  loadingText.textContent = 'Ready!';
  await new Promise(r => setTimeout(r, 400));
  
  loadingOverlay.classList.add('hidden');
  
  initRecognition();
  loadVoices();
  
  // Build greeting
  const firstName = LEAD.name ? LEAD.name.split(' ')[0] : '';
  let greeting;
  
  if (firstName && LEAD.country) {
    greeting = `Hi ${firstName}! Great to have you here. I'm Dr. CV, your global expansion strategist. I see you're looking at expanding to ${LEAD.country}. Tell me, what's the main challenge you're facing with global growth right now?`;
  } else if (firstName) {
    greeting = `Hi ${firstName}! Thanks for joining. I'm Dr. CV. Tell me about your business - what markets are you looking to expand into?`;
  } else {
    greeting = `Welcome! I'm Dr. CV. What kind of business are you running, and which markets are you looking to expand into?`;
  }
  
  history.push({ role: 'assistant', content: greeting });
  updateUIStatus('speaking');
  await speak(greeting);
}

// ─── EVENT HANDLERS ───────────────────────────────────────────
document.getElementById('micBtn').addEventListener('click', () => {
  if (isListening) {
    stopListening();
  } else {
    if (isSpeaking) stopSpeaking();
    startListening();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  history = [];
  turns = 0;
  stopSpeaking();
  stopListening();
  updateUIStatus('ready');
  setTimeout(() => init(), 500);
});

let muted = false;
document.getElementById('muteBtn').addEventListener('click', function() {
  muted = !muted;
  voiceMuted = muted;
  this.classList.toggle('muted', muted);
  if (muted) stopSpeaking();
});

// Start!
init();
</script>
</body>
</html>
